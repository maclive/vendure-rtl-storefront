<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f0f"/>
      <stop offset="100%" style="stop-color:#1a1200"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="600" fill="url(#g1)"/>
  <circle cx="900" cy="300" r="350" fill="#c9933a" opacity="0.07"/>
  <circle cx="950" cy="250" r="200" fill="#c9933a" opacity="0.05"/>
  <!-- Shirt shape -->
  <g transform="translate(720,80)" fill="#c9933a" opacity="0.9">
    <path d="M120,0 L200,40 L170,80 L150,70 L150,280 L90,280 L90,70 L70,80 L40,40 Z" fill="#c9933a"/>
    <rect x="90" y="70" width="60" height="210" fill="#a07020" rx="4"/>
  </g>
  <!-- Phone shape -->
  <g transform="translate(880,120)">
    <rect width="120" height="220" rx="16" fill="#1a1a1a" stroke="#c9933a" stroke-width="2"/>
    <rect x="8" y="20" width="104" height="160" rx="4" fill="#c9933a" opacity="0.15"/>
    <circle cx="60" cy="200" r="10" fill="#333"/>
  </g>
  <!-- Perfume shape -->
  <g transform="translate(840,300)">
    <rect x="20" y="40" width="60" height="100" rx="8" fill="#8B6914"/>
    <rect x="30" y="20" width="40" height="30" rx="4" fill="#a07020"/>
    <rect x="40" y="10" width="20" height="15" rx="3" fill="#c9933a"/>
    <rect x="10" y="40" width="80" height="10" rx="2" fill="#c9933a" opacity="0.5"/>
  </g>
  <!-- Text decorations -->
  <circle cx="200" cy="150" r="3" fill="#c9933a" opacity="0.4"/>
  <circle cx="300" cy="250" r="2" fill="#c9933a" opacity="0.3"/>
  <circle cx="150" cy="400" r="4" fill="#c9933a" opacity="0.2"/>
