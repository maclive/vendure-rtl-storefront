    <path d="M350,60 Q420,20 490,60" stroke="#c9933a" stroke-width="8" fill="none" stroke-linecap="round"/>
    <rect x="335" y="60" width="30" height="50" rx="15" fill="#c9933a" opacity="0.8"/>
    <rect x="475" y="60" width="30" height="50" rx="15" fill="#c9933a" opacity="0.8"/>
    <!-- Watch -->
    <rect x="150" y="270" width="60" height="80" rx="12" fill="#1a1a1a" stroke="#c9933a" stroke-width="2"/>
    <circle cx="180" cy="310" r="22" fill="#0a0a0a" stroke="#c9933a" stroke-width="1"/>
    <line x1="180" y1="298" x2="180" y2="310" stroke="#c9933a" stroke-width="2"/>
    <line x1="180" y1="310" x2="190" y2="316" stroke="#fff" stroke-width="1.5"/>
    <rect x="168" y="350" width="24" height="8" rx="4" fill="#c9933a" opacity="0.5"/>
    <rect x="168" y="262" width="24" height="8" rx="4" fill="#c9933a" opacity="0.5"/>
  </g>
  <circle cx="250" cy="200" r="3" fill="#1D9E75" opacity="0.5"/>
