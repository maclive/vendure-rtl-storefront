<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600">
  <defs>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628"/>
      <stop offset="100%" style="stop-color:#0f0f0f"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="600" fill="url(#g2)"/>
  <circle cx="800" cy="200" r="400" fill="#1D9E75" opacity="0.06"/>
  <!-- Electronics icons -->
  <g transform="translate(700,100)">
    <!-- Laptop -->
    <rect x="30" y="80" width="200" height="130" rx="8" fill="#1a1a2e" stroke="#c9933a" stroke-width="1.5"/>
    <rect x="40" y="90" width="180" height="110" rx="4" fill="#c9933a" opacity="0.12"/>
    <rect x="10" y="210" width="240" height="12" rx="6" fill="#2a2a3e"/>
